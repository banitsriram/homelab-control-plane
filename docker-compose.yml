# docker-compose.yml — node-level infrastructure the control plane provides.
#
# The Kairos app is NOT here: it runs from its own repo and compose
# (github.com/banitsriram/Kairos — a FastAPI backend + Caddy stack bound to the
# tailnet). The node just clones it and `docker compose up -d`. Re-declaring it
# here would only drift from the source of truth.
#
# What lives here is the shared Brain/Brawn plumbing around the app:
#   - redis      : the job queue the Brain pushes work onto  (see examples/jobqueue)
#   - cloudflared: public ingress for selected HTTP services  (profile: ingress)
#
# Bring up what you need:
#   docker compose up -d redis
#   docker compose --profile ingress up -d cloudflared
services:
  redis:
    image: redis:7-alpine
    container_name: homelab-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"     # loopback only — never exposed off the box
    volumes:
      - redis_data:/data
    networks: [homelab]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Public ingress via a named Cloudflare Tunnel. Off by default (profile).
  # The token carries the tunnel's routing config — set which public hostname
  # maps to which local service in the Cloudflare Zero Trust dashboard, pointing
  # it at the node's Caddy (http://host.docker.internal:80). No inbound ports.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homelab-tunnel
    restart: unless-stopped
    profiles: ["ingress"]
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [homelab]

volumes:
  redis_data:

networks:
  homelab:
    name: homelab      # shared: join Kairos (or a worker) to reach redis here
