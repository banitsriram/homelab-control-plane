# /etc/ssh/sshd_config.d/10-homelab-hardening.conf
# Public-key only. Applied by setup.sh (step: ssh) after it confirms you have
# an authorized_keys entry or Tailscale SSH — otherwise it skips, to avoid a
# lockout. Tailscale SSH doesn't use sshd, so it keeps working regardless.
PasswordAuthentication no
PermitRootLogin no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
MaxAuthTries 3
X11Forwarding no
